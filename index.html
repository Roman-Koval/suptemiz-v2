<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="meta_title"></title>

    <meta name="description" content="" data-i18n="meta_description">

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">

    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
</head>

<body>

<header class="header">
    <div class="container header__container">

        <a href="#" class="logo" data-i18n="nav_logo"></a>

        <nav class="nav" id="navMenu">
            <ul class="nav__list">
                <li><a href="#services" data-i18n="nav_services"></a></li>
                <li><a href="#pricing" data-i18n="nav_pricing"></a></li>
                <li><a href="#how" data-i18n="nav_how"></a></li>
                <li><a href="#reviews" data-i18n="nav_reviews"></a></li>
                <li><a href="#order" class="btn" data-i18n="nav_order"></a></li>
            </ul>
        </nav>

        <select id="langSelect" class="lang-switch">
            <option value="ru">RU</option>
            <option value="tr">TR</option>
            <option value="en">EN</option>
        </select>

        <button class="burger" id="burgerBtn"></button>
    </div>
</header>


<!-- HERO -->
<section id="hero" class="hero">
    <div class="container">

        <h1 data-i18n="hero_title"></h1>
        <p class="hero__subtitle" data-i18n="hero_subtitle"></p>

        <div class="hero__badges">
            <span data-i18n="hero_badge_1"></span>
            <span data-i18n="hero_badge_2"></span>
            <span data-i18n="hero_badge_3"></span>
        </div>

        <div class="hero__actions">
            <a href="#order" class="btn btn-primary" data-i18n="hero_cta_primary"></a>
            <a href="#pricing" class="btn btn-secondary" data-i18n="hero_cta_secondary"></a>
        </div>

    </div>
</section>
<!-- SERVICES -->
<section id="services" class="services">
    <div class="container">
        <h2 data-i18n="services_title"></h2>
        <p class="section-subtitle" data-i18n="services_subtitle"></p>

        <div class="services__grid">

            <div class="service-card">
                <h3 data-i18n="services_standard_title"></h3>
                <p data-i18n="services_standard_text"></p>
                <ul>
                    <li data-i18n="services_standard_item_1"></li>
                    <li data-i18n="services_standard_item_2"></li>
                    <li data-i18n="services_standard_item_3"></li>
                </ul>
            </div>

            <div class="service-card">
                <h3 data-i18n="services_deep_title"></h3>
                <p data-i18n="services_deep_text"></p>
                <ul>
                    <li data-i18n="services_deep_item_1"></li>
                    <li data-i18n="services_deep_item_2"></li>
                    <li data-i18n="services_deep_item_3"></li>
                </ul>
            </div>

            <div class="service-card">
                <h3 data-i18n="services_office_title"></h3>
                <p data-i18n="services_office_text"></p>
                <ul>
                    <li data-i18n="services_office_item_1"></li>
                    <li data-i18n="services_office_item_2"></li>
                    <li data-i18n="services_office_item_3"></li>
                </ul>
            </div>

        </div>
    </div>
</section>


<!-- PRICING -->
<section id="pricing" class="pricing">
    <div class="container">
        <h2 data-i18n="pricing_title"></h2>
        <p class="section-subtitle" data-i18n="pricing_subtitle"></p>

        <div class="pricing__grid">

            <div class="price-card">
                <h3 data-i18n="pricing_standard_title"></h3>
                <div class="price" data-i18n="pricing_standard_price"></div>
                <p data-i18n="pricing_standard_text"></p>
                <span class="price-min" data-i18n="pricing_standard_min"></span>
                <span class="price-time" data-i18n="pricing_standard_time"></span>
            </div>

            <div class="price-card">
                <h3 data-i18n="pricing_deep_title"></h3>
                <div class="price" data-i18n="pricing_deep_price"></div>
                <p data-i18n="pricing_deep_text"></p>
                <span class="price-min" data-i18n="pricing_deep_min"></span>
                <span class="price-time" data-i18n="pricing_deep_time"></span>
            </div>

            <div class="price-card">
                <h3 data-i18n="pricing_office_title"></h3>
                <div class="price" data-i18n="pricing_office_price"></div>
                <p data-i18n="pricing_office_text"></p>
                <span class="price-min" data-i18n="pricing_office_min"></span>
                <span class="price-time" data-i18n="pricing_office_time"></span>
            </div>

        </div>
    </div>
</section>


<!-- HOW IT WORKS -->
<section id="how" class="how">
    <div class="container">
        <h2 data-i18n="how_title"></h2>

        <div class="how__steps">

            <div class="how-step">
                <h3 data-i18n="how_step_1_title"></h3>
                <p data-i18n="how_step_1_text"></p>
            </div>

            <div class="how-step">
                <h3 data-i18n="how_step_2_title"></h3>
                <p data-i18n="how_step_2_text"></p>
            </div>

            <div class="how-step">
                <h3 data-i18n="how_step_3_title"></h3>
                <p data-i18n="how_step_3_text"></p>
            </div>

        </div>
    </div>
</section>


<!-- REVIEWS -->
<section id="reviews" class="reviews">
    <div class="container">
        <h2 data-i18n="reviews_title"></h2>

        <div class="reviews__grid">

            <div class="review-card">
                <p data-i18n="reviews_1_text"></p>
                <span class="review-name" data-i18n="reviews_1_name"></span>
            </div>

            <div class="review-card">
                <p data-i18n="reviews_2_text"></p>
                <span class="review-name" data-i18n="reviews_2_name"></span>
            </div>

            <div class="review-card">
                <p data-i18n="reviews_3_text"></p>
                <span class="review-name" data-i18n="reviews_3_name"></span>
            </div>

        </div>
    </div>
</section>
<!-- ORDER FORM -->
<section id="order" class="order">
    <div class="container">
        <h2 data-i18n="order_title"></h2>
        <p class="section-subtitle" data-i18n="order_subtitle"></p>

        <form id="orderForm" class="order-form">

            <label>
                <span data-i18n="form_name"></span>
                <input type="text" id="name" data-i18n-placeholder="form_name_placeholder">
            </label>

            <label>
                <span data-i18n="form_phone"></span>
                <input type="tel" id="phone" data-i18n-placeholder="form_phone_placeholder">
            </label>

            <label>
                <span data-i18n="form_region"></span>
                <input type="text" id="region" data-i18n-placeholder="form_region_placeholder">
            </label>

            <label>
                <span data-i18n="form_date"></span>
                <input type="date" id="date">
            </label>

            <label>
                <span data-i18n="form_time"></span>
                <input type="time" id="time">
            </label>

            <label>
                <span data-i18n="form_comment"></span>
                <textarea id="comment" data-i18n-placeholder="form_comment_placeholder"></textarea>
            </label>

            <button type="submit" class="btn btn-primary" data-i18n="order_submit"></button>

            <p class="form-note" data-i18n="form_agree"></p>

        </form>
    </div>
</section>


<!-- FOOTER -->
<footer class="footer">
    <div class="container footer__container">

        <div class="footer__left">
            <span data-i18n="footer_rights"></span>
        </div>

        <div class="footer__right">
            <a href="#" data-i18n="footer_privacy"></a>
            <a href="#" data-i18n="footer_terms"></a>
        </div>

    </div>
</footer>


<!-- SUCCESS MODAL -->
<div id="successModal" class="modal">
    <div class="modal__content">
        <p data-i18n="order_success"></p>
        <button class="btn" id="successClose" data-i18n="modal_close"></button>
    </div>
</div>

<!-- ERROR MODAL -->
<div id="errorModal" class="modal">
    <div class="modal__content">
        <p data-i18n="order_error"></p>
        <button class="btn" id="errorClose" data-i18n="modal_close"></button>
    </div>
</div>


<!-- SCRIPTS -->
<script src="assets/js/i18n.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/menu.js"></script>
<script src="assets/js/calc.js"></script>
<script src="assets/js/sw-register.js"></script>

</body>
</html>
