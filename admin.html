<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEMIZ — Админка</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <div class="container">
    <h1>Админка заказов</h1>
    <p id="adminStatus">Загрузка...</p>

    <div class="admin-toolbar">
      <div class="admin-filters">
        <button class="btn btn--ghost filter-btn" data-status="all">Все</button>
        <button class="btn btn--ghost filter-btn" data-status="pending">В ожидании</button>
        <button class="btn btn--ghost filter-btn" data-status="confirmed">Подтверждён</button>
        <button class="btn btn--ghost filter-btn" data-status="in_progress">В процессе</button>
        <button class="btn btn--ghost filter-btn" data-status="done">Завершён</button>
        <button class="btn btn--ghost filter-btn" data-status="cancelled">Отменён</button>
      </div>

      <div class="admin-right">
        <input type="text" id="searchInput" class="admin-search" placeholder="Поиск по имени или телефону" />
        <button class="btn btn--ghost" id="exportBtn">Экспорт в Excel</button>
        <button class="btn btn--ghost" id="refreshBtn">Обновить</button>
      </div>
    </div>

    <audio id="newOrderSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Имя</th>
          <th>Телефон</th>
          <th>Район</th>
          <th>Тип</th>
          <th>Площадь</th>
          <th>Дата/время</th>
          <th>Цена</th>
          <th>Создано</th>
          <th>Комментарий</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
