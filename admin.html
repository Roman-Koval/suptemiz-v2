<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>SupTemiz — Админка заказов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="admin-body">
  <header class="header">
    <div class="container header__inner">
      <div class="logo">
        <span class="logo__mark">Sup</span><span class="logo__text">Temiz</span>
      </div>
      <span class="admin-header-title">Админка заказов</span>
    </div>
  </header>

  <main class="section section--alt">
    <div class="container">
      <div class="admin-panel">
        <div class="admin-panel__top">
          <h1>Заказы</h1>
          <div class="admin-panel__controls">
            <button class="btn btn--ghost" id="refreshBtn">Обновить</button>
            <span class="admin-status" id="adminStatus">Загрузка...</span>
          </div>
        </div>

        <div class="admin-table-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Телефон</th>
                <th>Район</th>
                <th>Тип</th>
                <th>Площадь</th>
                <th>Дата/время</th>
                <th>Цена (€)</th>
                <th>Создано</th>
                <th>Комментарий</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="ordersBody">
              <tr>
                <td colspan="11" class="admin-empty">Нет данных</td>
              </tr>
            </tbody>
          </table>
        </div>

        <p class="admin-note">
          Данные хранятся в Firebase Firestore. Страница обновляется в реальном времени.
        </p>
      </div>
    </div>
  </main>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
