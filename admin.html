<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка — SupTemiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>

<div class="admin-container">

  <!-- Шапка -->
  <header class="admin-header">
    <a href="index.html" class="admin-header__logo">
      <span class="logo__mark">Sup</span>Temiz
    </a>
    <h1 class="admin-header__title">📋 Управление заказами</h1>
    <a href="index.html" class="admin-header__back">← На сайт</a>
  </header>

  <!-- Общая статистика -->
  <div class="admin-stats" id="adminStats">
    <span>Загружаем данные...</span>
  </div>

  <!-- Панель управления -->
  <div class="admin-toolbar">
    <div class="admin-filters">
      <button class="btn btn--filter btn--active" data-status="all">
        Все <span class="filter-count">0</span>
      </button>
      <button class="btn btn--filter" data-status="pending">
        В ожидании <span class="filter-count">0</span>
      </button>
      <button class="btn btn--filter" data-status="confirmed">
        Подтверждён <span class="filter-count">0</span>
      </button>
      <button class="btn btn--filter" data-status="in_progress">
        В процессе <span class="filter-count">0</span>
      </button>
      <button class="btn btn--filter" data-status="done">
        Завершён <span class="filter-count">0</span>
      </button>
      <button class="btn btn--filter" data-status="cancelled">
        Отменён <span class="filter-count">0</span>
      </button>
    </div>

    <div class="admin-right">
      <input
        type="search"
        id="searchInput"
        class="admin-search"
        placeholder="🔍 Поиск по имени, телефону, ID..."
      />
      <button id="refreshBtn" class="btn btn--filter">🔄 Обновить</button>
      <button id="exportBtn"  class="btn btn--filter">📥 Экспорт CSV</button>
    </div>
  </div>

  <!-- Таблица (desktop) -->
  <div class="admin-table-wrapper">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Имя</th>
          <th>Телефон</th>
          <th>Район</th>
          <th>Тип</th>
          <th>Площадь</th>
          <th>Дата / время</th>
          <th>Цена</th>
          <th>Создан</th>
          <th>Комментарий</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="ordersTableBody">
        <tr>
          <td colspan="12" style="text-align:center;padding:20px;color:#6b7280;">Загружаем заказы...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Карточки (mobile) -->
  <div class="admin-card-list" id="ordersCardList"></div>

</div>

<script type="module" src="assets/js/admin.js"></script>
</body>
</html>
