<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Админка заказов — SupTemiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body>
  <div class="admin-container">

    <!-- ИСПРАВЛЕНО: добавлен .admin-header с кнопкой "На сайт" -->
    <div class="admin-header">
      <h1>Админка заказов</h1>
      <a href="/suptemiz-v2/" class="admin-site-link" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M4.25 5.5a.75.75 0 0 0-.75.75v8.5c0 .414.336.75.75.75h8.5a.75.75 0 0 0 .75-.75v-4a.75.75 0 0 1 1.5 0v4A2.25 2.25 0 0 1 12.75 17h-8.5A2.25 2.25 0 0 1 2 14.75v-8.5A2.25 2.25 0 0 1 4.25 4h5a.75.75 0 0 1 0 1.5h-5Z" clip-rule="evenodd"/>
          <path fill-rule="evenodd" d="M6.194 12.753a.75.75 0 0 0 1.06.053L16.5 4.44v2.81a.75.75 0 0 0 1.5 0v-4.5a.75.75 0 0 0-.75-.75h-4.5a.75.75 0 0 0 0 1.5h2.553l-9.056 8.194a.75.75 0 0 0-.053 1.06Z" clip-rule="evenodd"/>
        </svg>
        На сайт
      </a>
    </div>

    <div class="admin-controls">

      <!-- ИСПРАВЛЕНО: добавлены .filter-badge для счётчиков заказов -->
      <div class="admin-filters">
        <button data-status="all"         class="btn btn--filter btn--active">Все         <span class="filter-badge">0</span></button>
        <button data-status="pending"     class="btn btn--filter">В ожидании  <span class="filter-badge">0</span></button>
        <button data-status="confirmed"   class="btn btn--filter">Подтверждён <span class="filter-badge">0</span></button>
        <button data-status="in_progress" class="btn btn--filter">В процессе  <span class="filter-badge">0</span></button>
        <button data-status="done"        class="btn btn--filter">Завершён    <span class="filter-badge">0</span></button>
        <button data-status="cancelled"   class="btn btn--filter">Отменён     <span class="filter-badge">0</span></button>
      </div>

      <!-- ИСПРАВЛЕНО: кнопки получили классы для стилизации -->
      <div class="admin-actions">
        <input type="search" id="searchInput" placeholder="Поиск по имени или телефону…" />
        <button id="refreshBtn" class="btn btn--refresh">Обновить</button>
        <button id="exportBtn"  class="btn btn--export">Экспорт в CSV</button>
      </div>

    </div>

    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Район</th>
            <th>Тип</th>
            <th>Площадь</th>
            <th>Дата/время</th>
            <th>Цена</th>
            <th>Создано</th>
            <th>Комментарий</th>
            <th>Статус</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
      </table>
    </div>

    <div class="admin-card-list" id="ordersCardList"></div>

  </div>

  <script type="module" src="assets/js/admin.js"></script>
</body>
</html>
